<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Batch 2023–2026 Farewell</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
font-family: 'Segoe UI', sans-serif;
background:black;
color:white;
}

/* Fullscreen Video */

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
cursor:pointer;
}

/* Dark overlay */

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
}

/* Center content */

.content{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

/* Title animation */

.title{
font-size:50px;
font-weight:bold;
letter-spacing:2px;
animation:fadeIn 3s ease;
}

/* Subtitle */

.subtitle{
font-size:24px;
margin-top:10px;
opacity:0.9;
}

/* Fade animation */

@keyframes fadeIn{

0%{
opacity:0;
transform:translateY(40px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<video id="video" autoplay loop playsinline>
<source src="farwell_video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="content">

<div class="title">
Farewell Memories
</div>

<div class="subtitle">
Batch 2023 – 2026
</div>

</div>

<script>

var video = document.getElementById("video");

/* Tap video to pause or play */

document.body.addEventListener("click", function(){

if(video.paused){
video.play();
}
else{
video.pause();
}

});

</script>

</body>
</html>
