<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Video Player</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

/* Full screen responsive video */

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
cursor:pointer;
}

</style>

</head>

<body>

<video id="video" autoplay loop playsinline>
<source src="farwell_video.mp4" type="video/mp4">
</video>

<script>

var video = document.getElementById("video");

/* Click video to pause or play */

video.addEventListener("click", function(){

if(video.paused){
video.play();
}
else{
video.pause();
}

});

</script>

</body>
</html>
